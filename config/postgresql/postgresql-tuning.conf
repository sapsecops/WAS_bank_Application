# =============================================================
# pg_hba.conf - Add these lines for WAS connectivity
# File location: /etc/postgresql/15/main/pg_hba.conf
# Reload with: sudo systemctl reload postgresql
# =============================================================

# TYPE  DATABASE    USER        ADDRESS           METHOD
host    bankingdb   bankadmin   127.0.0.1/32      md5
host    bankingdb   bankadmin   ::1/128           md5

# If WAS runs on a separate server, replace 127.0.0.1 with its IP:
# host  bankingdb   bankadmin   192.168.1.100/32  md5


# =============================================================
# postgresql.conf tuning for banking workload
# File location: /etc/postgresql/15/main/postgresql.conf
# Restart with: sudo systemctl restart postgresql
# =============================================================

# --- Connections ---
# Must be > WAS max pool (30) + headroom for DBA/monitoring tools
max_connections = 100

# --- Memory (tune to your server RAM) ---
# For 4GB RAM server:
shared_buffers     = 1GB        # 25% of RAM
work_mem           = 16MB       # per-sort/hash operation
maintenance_work_mem = 256MB    # for VACUUM, CREATE INDEX
effective_cache_size = 3GB      # 75% of RAM (query planner hint)
wal_buffers        = 64MB

# For 8GB RAM server, double the values above.

# --- Write-ahead log (durability) ---
wal_level          = replica
synchronous_commit = on         # do not disable for banking data
checkpoint_completion_target = 0.9
max_wal_size       = 1GB

# --- Query planner ---
random_page_cost   = 1.1        # SSD storage
effective_io_concurrency = 200  # SSD concurrent I/O

# --- Logging (essential for debugging WAS pool issues) ---
log_destination    = 'stderr'
logging_collector  = on
log_directory      = '/var/log/postgresql'
log_filename       = 'postgresql-%Y-%m-%d.log'
log_rotation_age   = 1d
log_rotation_size  = 100MB
log_connections    = on
log_disconnections = on
log_duration       = off
log_min_duration_statement = 500    # log slow queries > 500ms
log_line_prefix    = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints    = on
log_lock_waits     = on
log_temp_files     = 0

# --- Autovacuum (keep tables healthy for banking workloads) ---
autovacuum         = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
